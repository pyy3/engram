name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ripgrep
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ripgrep
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install ripgrep
          fi

      - name: Run tests
        run: |
          cd ${{ github.workspace }}
          python tests/test_search.py
          python tests/test_init.py
          python tests/test_qdrant.py
          python tests/test_hooks.py

      - name: Test CLI
        run: |
          chmod +x bin/*
          bin/engram version
          bin/engram help

      - name: Test init flow
        run: |
          mkdir /tmp/test-project && cd /tmp/test-project
          ${{ github.workspace }}/bin/engram init .
          ${{ github.workspace }}/bin/engram status

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck bin/engram bin/engram-init bin/engram-start bin/engram-end \
                     bin/engram-status bin/engram-qdrant bin/engram-hooks \
                     bin/engram-template install.sh || true

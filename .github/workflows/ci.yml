name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install engram
        run: bash install.sh

      - name: Verify installation
        run: |
          export PATH="$HOME/.engram/bin:$PATH"
          engram version
          engram help

      - name: Run tests
        run: |
          export PATH="$HOME/.engram/bin:$PATH"
          python -m pytest tests/ -v --tb=short

      - name: Test init
        run: |
          export PATH="$HOME/.engram/bin:$PATH"
          mkdir /tmp/test-project && cd /tmp/test-project
          engram init
          test -d .claude/memory/semantic
          test -d .claude/memory/procedural
          test -d .claude/memory/active
          test -d .claude/memory/lossless
          test -f CLAUDE.md

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax
        run: python -m py_compile bin/engram-search bin/engram-index bin/engram-lint bin/engram-compound bin/engram-xref bin/engram-sync

  release:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
